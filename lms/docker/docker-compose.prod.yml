version: "3.7"
name: lms-prod

services:
  mariadb:
    image: mariadb:10.8
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./mariadb-frappe.cnf:/etc/mysql/conf.d/frappe.cnf

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data

  frappe:
    image: frappe/bench:latest
    restart: always
    command: bash /workspace/init.prod.sh
    environment:
      - SHELL=/bin/bash
      - SITE_NAME=lms.professionalaiinstitute.com
      - DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    working_dir: /home/frappe
    volumes:
      - .:/workspace
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - mariadb
      - redis
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - frappe

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL}
      --agree-tos --no-eff-email
      -d lms.professionalaiinstitute.com

volumes:
  mariadb-data:
  redis-data:
  frappe-bench:
  certbot-www:
  certbot-certs:
