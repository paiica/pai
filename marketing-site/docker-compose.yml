version: "3.9"

services:
  marketing:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pai-marketing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://paii.ca}
      NEXT_PUBLIC_LMS_URL: ${NEXT_PUBLIC_LMS_URL:-https://learn.paii.ca}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.paii.ca}
    ports:
      - "3000:3000"
